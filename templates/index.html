<!DOCTYPE html>
<html>

<head>
    <title>NetInspector Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="text-info">🔍 NetInspector Live Report</h1>
        <hr>
        <table class="table table-dark table-striped mt-4">
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Hostname</th>
                    <th>MAC Address</th>
                    <th>Vendor</th>
                </tr>
            </thead>
            <tbody>
                {% for host in hosts %}
                <tr>
                    <td><span class="badge bg-primary">{{ host.ip }}</span></td>
                    <td>{{ host.hostname }}</td>
                    <td><code>{{ host.mac_address }}</code></td>
                    <td class="text-warning fw-bold">{{ host.vendor }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
